<header class="header" dir="rtl">
  <div class="header__inner">
    <a class="header__logo" routerLink="/home">הפורום</a>

    <nav class="header__nav">
      @if (auth.isLoggedIn()) {
        <a routerLink="/home" routerLinkActive="active">בית</a>
        <button type="button" class="header__logout" (click)="logout()">התנתקות</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active">כניסה</a>
        <a routerLink="/register" routerLinkActive="active">הרשמה</a>
      }
    </nav>
  </div>
</header>
